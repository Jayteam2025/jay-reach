name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/Jayteam2025/jay-reach/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'Jeeiib,dependabot[bot]'
          custom-notsigned-prologue: 'Merci pour ta contribution. Avant le merge, merci de signer le CLA (voir CLA.md). / Thanks for your contribution. Please sign the CLA before we can merge (see CLA.md).'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prologue: 'Tous les contributeurs ont signe le CLA. / All contributors have signed the CLA.'
